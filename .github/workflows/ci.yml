name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Formula Audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Tap local checkout
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/arcavenae"
          ln -sf "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/arcavenae/homebrew-tap"

      - name: Audit formulas
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            brew audit --strict "arcavenae/tap/$name"
          done

      - name: Check style
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            brew style "arcavenae/tap/$name"
          done
